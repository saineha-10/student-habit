<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Information Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root {
    --bg-color: #0d141c;
    --card-bg: #111b27;
    --input-bg: #1a2634;
    --accent-color: #26e3c2;
    --text-secondary: #718096;
    --border-color: #1e2d3d;
}
body {
    background-color: var(--bg-color);
    color: white;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
}
.form-container {
    width: 100%;
    max-width: 600px;
    padding: 20px;
}
.header-section h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
}
.header-section p {
    color: var(--text-secondary);
    font-size: 0.95rem;
}
.form-card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}
.section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 30px;
}
.dark-input {
    background-color: var(--input-bg);
    border: 1px solid var(--border-color);
    color: white;
    padding: 12px 16px;
    border-radius: 8px;
    transition: all 0.2s;
}
.dark-input:focus {
    background-color: var(--input-bg);
    border-color: var(--accent-color);
    box-shadow: 0 0 0 2px rgba(38, 227, 194, 0.2);
    color: white;
    outline: none;
}
.custom-range {
    height: 6px;
    background: #2d3e50;
    border-radius: 5px;
    appearance: none;
    width: 100%;
}
.custom-range::-webkit-slider-thumb {
    appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent-color);
    border: 3px solid var(--card-bg);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(38, 227, 194, 0.5);
}
.range-label-row {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.75rem;
}
.value-badge {
    color: var(--accent-color);
    font-weight: 700;
}
.btn-submit {
    background-color: var(--accent-color);
    color: #0b141e;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 1rem;
    margin-top: 20px;
    transition: transform 0.1s, background-color 0.2s;
}
.btn-submit:hover {
    background-color: #1fcba8;
    color: #0b141e;
}
.btn-submit:active {
    transform: scale(0.98);
}
.icon-accent {
    color: var(--accent-color);
}
</style>
</head>
<body>
<div class="form-container">
    <div class="header-section text-center mb-4">
        <h1>Student Information Form</h1>
        <p>Enter your daily habits and study patterns</p>
    </div>
    <div class="form-card">
        <div class="section-title">
            <i class="bi bi-book icon-accent"></i> Daily Metrics
        </div>

        <form id="studentForm" method="POST" action="/api/predict/">
    {% csrf_token %}
    <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label mb-0">
                <i class="bi bi-clock icon-accent"></i> Hours Studied
            </label>
            <span class="value-badge" id="hoursVal">4 hrs</span>
        </div>
        <input type="range" class="custom-range"
               id="hoursInput" name="hours" min="0" max="12" value="4">
        <div class="range-label-row">
            <span>0 hrs</span>
            <span>12 hrs</span>
        </div>
    </div>
    <div class="mb-4">
        <label class="form-label">
            <i class="bi bi-calendar-check icon-accent"></i> Attendance Percentage
        </label>
        <input type="text" class="form-control dark-input"
               id="attendanceInput" name="attendance"
               placeholder="Enter attendance percentage (e.g., 85.5)">
    </div>
    <div class="mb-4">
        <label class="form-label">
            <i class="bi bi-brain icon-accent"></i> Sleep Hours
        </label>
        <input type="text" class="form-control dark-input"
               id="sleepInput" name="sleep"
               placeholder="Enter sleep hours">
    </div>
    <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label mb-0">
                <i class="bi bi-lightning-charge icon-accent"></i> Stress Level
            </label>
            <span class="value-badge" id="stressVal">5/10</span>
        </div>
        <input type="range" class="custom-range"
               id="stressInput" name="stress"
               min="1" max="10" value="5">
        <div class="range-label-row">
            <span>Low (1)</span>
            <span>High (10)</span>
        </div>
    </div>
    <div class="mb-4">
        <label class="form-label">
            <i class="bi bi-activity icon-accent"></i>
            Exercise Frequency (days per week)
        </label>
        <input type="text" class="form-control dark-input"
               id="exerciseInput" name="exercise"
               placeholder="Enter days per week (0-7)">
    </div>
    <button type="submit" class="btn btn-submit w-100">Submit</button>
</form>
<script>
const hoursInput = document.getElementById('hoursInput');
const stressInput = document.getElementById('stressInput');
const hoursVal = document.getElementById('hoursVal');
const stressVal = document.getElementById('stressVal');
hoursInput.addEventListener('input', () => {
    hoursVal.textContent = `${hoursInput.value} hrs`;
});
stressInput.addEventListener('input', () => {
    stressVal.textContent = `${stressInput.value}/10`;
});
</script>
</body>
</html>
