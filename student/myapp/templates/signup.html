<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTrack - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-color: #0d141c;
            --card-bg: #111b27;
            --input-bg: #1a2634;
            --accent-color: #00f2c3;
            --text-secondary: #718096;
            --border-color: #1e2d3d;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(180px);
            opacity: 0.03;
            bottom: 5%;
            right: 5%;
            z-index: -1;
        }
        .signup-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .header-text {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
        }
        .logo-text span {
            color: var(--accent-color);
        }
        .input-group-text {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-secondary);
            border-radius: 10px 0 0 10px;
        }
        .dark-input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-left: none;
            color: white;
            padding: 12px;
            border-radius: 0 10px 10px 0;
        }
       .dark-input:focus {
            background-color: var(--input-bg);
            border-color: var(--accent-color);
            box-shadow: none;
            color: white;
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .strength-meter {
            height: 4px;
            background-color: var(--border-color);
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }
        .btn-signup {
            background-color: var(--accent-color);
            color: #0b141e;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn-signup:hover {
            background-color: #00d9b0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 195, 0.2);
        }
        .login-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .login-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
        .form-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="signup-card">
    <div class="header-text">
        <div class="logo-text">Uni<span>Track</span></div>
        <p class="text-secondary small">Create an account to start tracking</p>
    </div>
    <form method="POST" action="{% url 'signup' %}">
          {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="full_name" class="form-control dark-input" placeholder="John Doe" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control dark-input" placeholder="name@example.com" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" id="password" class="form-control dark-input" placeholder="Min. 8 characters" required>
            </div>
            <div class="strength-meter">
                <div id="strengthBar" class="strength-bar"></div>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                <input type="password" name="confirm_password" class="form-control dark-input" placeholder="Repeat password" required>
            </div>
        </div>
        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="terms" required>
            <label class="form-check-label text-secondary small" for="terms">
                I agree to the <span class="text-white">Terms of Service</span> and <span class="text-white">Privacy Policy</span>
            </label>
        </div>
        <button type="submit" class="btn-signup" >Create Account</button>
    </form>
    <div class="login-text">
        Already have an account? <a href="{% url 'login' %}" class="login-link">Login</a>
    </div>
</div>

<script>
    const passInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    passInput.addEventListener('input', () => {
        const val = passInput.value;
        if (val.length === 0) {
            strengthBar.style.width = '0%';
        } else if (val.length < 5) {
            strengthBar.style.width = '30%';
            strengthBar.style.backgroundColor = '#ff4d4d'; 
        } else if (val.length < 8) {
            strengthBar.style.width = '60%';
            strengthBar.style.backgroundColor = '#ffd11a';
        } else {
            strengthBar.style.width = '100%';
            strengthBar.style.backgroundColor = '#00f2c3'; 
        }
    });
    document.getElementById('signupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Account successfully created! Please check your email.');
    });
</script>
</body>
</html>
