<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTrack Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #0d141c;
            --card-bg: #111b27;
            --input-bg: #1a2634;
            --accent-color: #00f2c3;
            --text-secondary: #718096;
            --border-color: #1e2d3d;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.05;
            top: 10%;
            left: 10%;
            z-index: -1;
        }
        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 45px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo-icon {
            font-size: 2.5rem;
            color: var(--accent-color);
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 195, 0.3));
        }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
        }
        .welcome-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: -5px;
        }
        .input-group-text {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-secondary);
            border-radius: 10px 0 0 10px;
        }
        .dark-input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-left: none;
            color: white;
            padding: 12px;
            border-radius: 0 10px 10px 0;
            transition: all 0.3s ease;
        }
        .dark-input:focus {
            background-color: var(--input-bg);
            border-color: var(--accent-color);
            box-shadow: none;
            color: white;
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .form-check-input {
            background-color: var(--input-bg);
            border-color: var(--border-color);
            cursor: pointer;
        }
        .form-check-input:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
        .form-check-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .forgot-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }
        .forgot-link:hover {
            opacity: 0.8;
            color: var(--accent-color);
        }
        .btn-login {
            background-color: var(--accent-color);
            color: #0b141e;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background-color: #00d9b0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 195, 0.2);
        }
        .signup-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .signup-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-container">
        <i class="bi bi-person-circle logo-icon"></i>
        <div class="logo-text">UniTrack</div>
    </div>
    <form id="loginForm" method="POST" action="{% url 'login' %}">
        {% csrf_token %}    
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control dark-input" placeholder="Email Address" required>
            </div>
        </div>
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control dark-input" placeholder="Password" required>
            </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-login">Login</button>
    </form>
    <div class="signup-text">
        Don't have an account? <a href="{% url 'signup' %}" class="signup-link">Sign Up</a>
    </div>
</div>
</body>
</html>
