<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTrack - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #0d141c;
            --card-bg: #111b27;
            --input-bg: #1a2634;
            --accent-color: #00f2c3;
            --text-secondary: #718096;
            --border-color: #1e2d3d;
            --log-bg: #090e14;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .admin-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Upload Zone Styling */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: rgba(26, 38, 52, 0.3);
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
            background-color: rgba(0, 242, 195, 0.05);
        }

        .upload-icon {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        /* Training Result Log Styling  */
        .log-terminal {
            background-color: var(--log-bg);
            border-radius: 8px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .log-entry { margin-bottom: 5px; }
        .log-success { color: var(--accent-color); }
        .log-info { color: #3b82f6; }
        .log-timestamp { color: var(--text-secondary); margin-right: 10px; }

        /* Buttons */
        .btn-retrain {
            background-color: var(--accent-color);
            color: #0b141e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-retrain:hover {
            background-color: #00d9b0;
            box-shadow: 0 0 15px rgba(0, 242, 195, 0.3);
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .accent-text { color: var(--accent-color); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h1 class="h3 fw-bold mb-1">Admin Panel [cite: 14]</h1>
            <p class="text-secondary small mb-0">Manage datasets and retrain the predictive model</p>
        </div>
        <button class="btn btn-outline small">
            <i class="bi bi-box-arrow-right me-2"></i><a href="login.html">Logout</a>
        </button>
    </div>
    <div class="admin-card">
        <div class="card-title">
            <i class="bi bi-cloud-arrow-up accent-text"></i> Upload Dataset
        </div>
        <div class="upload-zone" id="dropZone">
            <i class="bi bi-filetype-csv upload-icon"></i>
            <h5 class="mb-2">Drag and drop CSV file</h5>
            <p class="text-secondary small">Only .csv files are supported for model training </p>
            <input type="file" id="fileInput" hidden accept=".csv">
            <button class="btn btn-outline btn-sm mt-2" onclick="document.getElementById('fileInput').click()">
                Browse Files
            </button>
        </div>
        <div id="fileInfo" class="mt-3 small accent-text" style="display:none;"></div>
    </div>

    <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="card-title mb-0">
                <i class="bi bi-cpu accent-text"></i> Model Configuration
            </div>
            <button class="btn btn-retrain" id="retrainBtn">
                <i class="bi bi-play-fill me-1"></i> Retrain Model 
            </button>
        </div>
        
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <label class="small text-secondary mb-2">Epochs</label>
                <input type="number" class="form-control" style="background: var(--input-bg); border-color: var(--border-color); color: white;" value="50">
            </div>
            <div class="col-md-6">
                <label class="small text-secondary mb-2">Learning Rate</label>
                <input type="text" class="form-control" style="background: var(--input-bg); border-color: var(--border-color); color: white;" value="0.001">
            </div>
        </div>

        <label class="small text-secondary mb-2">Training Result Log</label>
        <div class="log-terminal" id="logTerminal">
            <div class="log-entry">
                <span class="log-timestamp">[10:45:01]</span>
                <span class="log-info">System initialized. Ready for dataset.</span>
            </div>
        </div>
    </div>
</div>

<script>
const logTerminal = document.getElementById('logTerminal');
const retrainBtn = document.getElementById('retrainBtn');
const fileInput = document.getElementById('fileInput');
function addLog(message, type = 'info') {
    const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-timestamp">[${time}]</span><span class="log-${type}">${message}</span>`;
    logTerminal.appendChild(entry);
    logTerminal.scrollTop = logTerminal.scrollHeight;
}
retrainBtn.addEventListener('click', () => {
    const file = fileInput.files[0];
    if(!file) {
        alert("Select a CSV file first");
        return;
    }
    retrainBtn.disabled = true;
    retrainBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Training...';
    const formData = new FormData();
    formData.append("file", file);
    addLog('Sending dataset to backend for retraining...', 'info');
    fetch("/api/retrain/", { 
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            addLog(data.message, 'success');
            addLog(`Final Accuracy: ${data.accuracy}`, 'success');
        } else {
            addLog(`Error: ${data.message}`, 'info');
        }
        retrainBtn.disabled = false;
        retrainBtn.innerHTML = '<i class="bi bi-play-fill me-1"></i> Retrain Model';
    })
    .catch(err => {
        console.error(err);
        addLog("An error occurred while retraining the model", 'info');
        retrainBtn.disabled = false;
        retrainBtn.innerHTML = '<i class="bi bi-play-fill me-1"></i> Retrain Model';
    });
});

fileInput.addEventListener('change', (e) => {
    if(e.target.files.length > 0) {
        const fileName = e.target.files[0].name;
        document.getElementById('fileInfo').style.display = 'block';
        document.getElementById('fileInfo').textContent = `Ready to upload: ${fileName}`;
        addLog(`Dataset selected: ${fileName}`, 'info');
    }
});
</script>


</body>
</html>
